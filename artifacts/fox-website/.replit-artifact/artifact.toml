kind = "web"
previewPath = "/"
title = "Fox IT Website"
version = "1.0.0"
id = "artifacts/fox-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21657

[services.development]
run = "pnpm --filter @workspace/fox-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fox-website", "run", "build" ]
publicDir = "artifacts/fox-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21657"
BASE_PATH = "/"
